apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: smartbank
  labels:
    app.kubernetes.io/name: discovery-server
spec:
  ports:
    - name: http
      port: 8761
      targetPort: http
  selector:
    app.kubernetes.io/name: discovery-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: smartbank
  labels:
    app.kubernetes.io/name: discovery-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: discovery-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: discovery-server
    spec:
      containers:
        - name: discovery-server
          image: chhundev/smartbank-discovery-server:1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8761
          envFrom:
            - configMapRef:
                name: smartbank-config
            - secretRef:
                name: smartbank-secret
          env:
            - name: EUREKA_INSTANCE_HOSTNAME
              value: discovery-server
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: EUREKA_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:$(EUREKA_PASSWORD)@discovery-server:8761/eureka/
            - name: SPRING_SECURITY_USER_NAME
              value: eureka
            - name: SPRING_SECURITY_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: EUREKA_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: smartbank
  labels:
    app.kubernetes.io/name: config-server
spec:
  ports:
    - name: http
      port: 8888
      targetPort: http
  selector:
    app.kubernetes.io/name: config-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: smartbank
  labels:
    app.kubernetes.io/name: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: config-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: config-server
    spec:
      containers:
        - name: config-server
          image: chhundev/smartbank-config-server:1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8888
          envFrom:
            - configMapRef:
                name: smartbank-config
            - secretRef:
                name: smartbank-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "native,k8s"
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: EUREKA_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:$(EUREKA_PASSWORD)@discovery-server:8761/eureka/
            - name: SPRING_SECURITY_USER_NAME
              value: config
            - name: SPRING_SECURITY_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: CONFIG_SERVER_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: smartbank
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smartbank
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: chhundev/smartbank-api-gateway:1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: smartbank-config
            - secretRef:
                name: smartbank-secret
          env:
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: EUREKA_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:$(EUREKA_PASSWORD)@discovery-server:8761/eureka/
            - name: CONFIG_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: CONFIG_SERVER_PASSWORD
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config:$(CONFIG_SERVER_PASSWORD)@config-server:8888
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: REDIS_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 150m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
