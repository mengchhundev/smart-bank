apiVersion: v1
kind: Secret
metadata:
  name: smartbank-secret
  namespace: smartbank
  labels:
    app.kubernetes.io/name: smartbank
type: Opaque
# DO NOT commit real values here. Populate from your secrets manager or CI/CD
# before applying: kubectl apply -f 02-secrets.yaml
# Example: envsubst < 02-secrets.yaml | kubectl apply -f -
stringData:
  POSTGRES_USER: "${POSTGRES_USER}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  JWT_SECRET: "${JWT_SECRET}"
  CONFIG_SERVER_PASSWORD: "${CONFIG_SERVER_PASSWORD}"
  EUREKA_PASSWORD: "${EUREKA_PASSWORD}"
  SMTP_USERNAME: "${SMTP_USERNAME}"
  SMTP_PASSWORD: "${SMTP_PASSWORD}"
  NOTIFICATION_TELEGRAM_ENABLED: "${TELEGRAM_ENABLED}"
  NOTIFICATION_TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
  NOTIFICATION_TELEGRAM_DEFAULT_CHAT_ID: "${TELEGRAM_CHAT_ID}"
