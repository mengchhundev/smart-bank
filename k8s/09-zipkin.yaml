apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: smartbank
  labels:
    app.kubernetes.io/name: zipkin
spec:
  ports:
    - name: http
      port: 9411
      targetPort: http
  selector:
    app.kubernetes.io/name: zipkin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: smartbank
  labels:
    app.kubernetes.io/name: zipkin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zipkin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9411
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
