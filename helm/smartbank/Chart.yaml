apiVersion: v2
name: smartbank
description: |
  SmartBank — production-grade banking microservices platform.
  Umbrella chart that owns all service templates directly and
  declares external charts (Bitnami, Prometheus, Ingress-NGINX) as dependencies.
type: application
version: 1.0.0
appVersion: "1.0.0"

maintainers:
  - name: SmartBank DevOps
    email: devops@smartbank.com
    url: https://github.com/your-org/smartbank

keywords:
  - banking
  - microservices
  - spring-boot

# ─── External chart dependencies ────────────────────────────────────────────
# Run: helm dependency update ./smartbank
# Charts are downloaded to charts/ and vendored.
dependencies:

  # ── Data layer ────────────────────────────────────────────────────────────
  - name: postgresql
    version: "14.5.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
    alias: postgresql

  - name: redis
    version: "19.6.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
    alias: redis

  - name: kafka
    version: "28.3.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
    alias: kafka

  - name: zookeeper
    version: "12.11.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: zookeeper.enabled
    alias: zookeeper

  # ── Observability ─────────────────────────────────────────────────────────
  - name: kube-prometheus-stack
    version: "58.7.2"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheusStack.enabled
    alias: prometheusStack

  - name: grafana
    version: "7.3.11"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
    alias: grafana

  # ── Ingress ───────────────────────────────────────────────────────────────
  - name: ingress-nginx
    version: "4.10.1"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingressNginx.enabled
    alias: ingressNginx
