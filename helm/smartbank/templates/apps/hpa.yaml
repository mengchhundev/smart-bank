{{- range $name, $svc := .Values.apps }}
{{- if $svc.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespaces.apps }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "smartbank.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ $.Values.global.hpa.minReplicas }}
  maxReplicas: {{ $.Values.global.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.global.hpa.cpuUtilization }}
{{- end }}
{{- end }}