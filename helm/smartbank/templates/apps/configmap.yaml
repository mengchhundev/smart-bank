{{- range $name, $svc := .Values.apps }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  namespace: {{ $.Values.global.namespaces.apps }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "smartbank.labels" $ | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: "k8s"
  SERVER_PORT: {{ $svc.port | quote }}
  SPRING_CLOUD_CONFIG_URI: {{ $.Values.global.configServerUrl | quote }}
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: {{ $.Values.global.eurekaUrl | quote }}
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "{{ $.Values.global.zipkinUrl }}/api/v2/spans"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: {{ $.Values.global.kafkaBootstrap | quote }}
  {{- range $key, $val := $svc.extraEnv }}
  {{- if $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
  {{- /* Inject Redis host from global if service declares SPRING_REDIS_HOST but leaves it empty */}}
  {{- if and (hasKey ($svc.extraEnv | default dict) "SPRING_REDIS_HOST") (not (index ($svc.extraEnv | default dict) "SPRING_REDIS_HOST")) }}
  SPRING_REDIS_HOST: {{ $.Values.global.redisHost | quote }}
  {{- end }}
{{- end }}
{{- end }}