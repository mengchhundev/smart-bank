{{- if .Values.configServer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-server-config
  namespace: {{ .Values.global.namespaces.infra }}
  labels:
    app.kubernetes.io/name: config-server
    {{- include "smartbank.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: "k8s"
  SERVER_PORT: {{ .Values.configServer.port | quote }}
  SPRING_CLOUD_CONFIG_SERVER_GIT_URI: {{ .Values.configServer.gitUri | quote }}
  SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: {{ .Values.configServer.gitBranch | quote }}
  SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_ON_START: {{ .Values.configServer.gitCloneOnStart | quote }}
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: {{ .Values.global.eurekaUrl | quote }}
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
{{- end }}
