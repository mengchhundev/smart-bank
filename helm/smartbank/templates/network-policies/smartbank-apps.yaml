{{- if .Values.networkPolicies.enabled }}
# Allow ingress → apps (from nginx ingress controller)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-apps
  namespace: {{ .Values.global.namespaces.apps }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
---
# Apps can talk to each other (inter-service communication)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-internal
  namespace: {{ .Values.global.namespaces.apps }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Apps → data namespace (PostgreSQL, Redis, Kafka)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-data
  namespace: {{ .Values.global.namespaces.apps }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
          podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
---
# Apps → infra (config-server, eureka)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-infra
  namespace: {{ .Values.global.namespaces.apps }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
      ports:
        - protocol: TCP
          port: 8888
        - protocol: TCP
          port: 8761
---
# Apps → obs (Zipkin tracing)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-obs
  namespace: {{ .Values.global.namespaces.apps }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
      ports:
        - protocol: TCP
          port: 9411
---
# Allow Prometheus scraping from obs namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: {{ .Values.global.namespaces.apps }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
{{- end }}
