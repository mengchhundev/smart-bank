{{- if .Values.networkPolicies.enabled }}
{{- range $key, $ns := .Values.global.namespaces }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- end }}
{{- end }}