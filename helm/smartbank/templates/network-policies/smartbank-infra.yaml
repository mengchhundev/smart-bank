{{- if .Values.networkPolicies.enabled }}
# Allow apps → infra (config-server, discovery-server)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-infra
  namespace: {{ .Values.global.namespaces.infra }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
      ports:
        - protocol: TCP
          port: 8888
        - protocol: TCP
          port: 8761
---
# Infra pods can talk to each other
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-infra-internal
  namespace: {{ .Values.global.namespaces.infra }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Infra can reach external (git for config-server)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-infra-egress-external
  namespace: {{ .Values.global.namespaces.infra }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: config-server
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
{{- end }}
