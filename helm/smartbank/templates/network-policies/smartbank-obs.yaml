{{- if .Values.networkPolicies.enabled }}
# Allow apps/infra → Zipkin (trace ingestion)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-trace-ingestion
  namespace: {{ .Values.global.namespaces.obs }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: zipkin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
      ports:
        - protocol: TCP
          port: 9411
---
# Obs internal communication (Prometheus → Grafana, Alertmanager)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-obs-internal
  namespace: {{ .Values.global.namespaces.obs }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Prometheus → all smartbank namespaces (scrape targets)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-egress
  namespace: {{ .Values.global.namespaces.obs }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
---
# Grafana → ingress (for external dashboard access)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: {{ .Values.global.namespaces.obs }}
  labels:
    app.kubernetes.io/part-of: smartbank
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: smartbank
      ports:
        - protocol: TCP
          port: 3000
{{- end }}
