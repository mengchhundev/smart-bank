# =============================================================================
# SmartBank Umbrella Chart — Master Values
# =============================================================================
# Override per environment:
#   helm install smartbank ./smartbank -f values-production.yaml
#
# Secret values should be supplied via --set or an external secrets tool:
#   helm install smartbank ./smartbank \
#     --set global.secrets.postgresPassword=<real> \
#     --set global.secrets.jwtSecret=<real>
# =============================================================================

# ─── Global ──────────────────────────────────────────────────────────────────
global:
  # Container registry prefix — e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/smartbank
  registry: "docker.io/smartbank"
  imageTag: "latest"
  imagePullPolicy: Always
  # imagePullSecrets: []

  # Namespace map — centralised so every template uses the same values
  namespaces:
    infra:    smartbank-infra
    apps:     smartbank-apps
    data:     smartbank-data
    obs:      smartbank-obs
    ingress:  smartbank-ingress

  # Cluster DNS suffix
  clusterDomain: "cluster.local"

  # ── Shared service discovery URLs (injected into every service) ─────────
  configServerUrl: "http://config-server.smartbank-infra.svc.cluster.local:8888"
  eurekaUrl:       "http://discovery-server.smartbank-infra.svc.cluster.local:8761/eureka/"
  zipkinUrl:       "http://zipkin.smartbank-obs.svc.cluster.local:9411"
  kafkaBootstrap:  "kafka.smartbank-data.svc.cluster.local:9092"
  redisHost:       "redis-master.smartbank-data.svc.cluster.local"
  postgresHost:    "postgresql.smartbank-data.svc.cluster.local"

  # ── Shared secrets (REPLACE before deploying) ───────────────────────────
  secrets:
    postgresPassword:     "changeme"    # All services use the same DB user for simplicity
    postgresRootPassword: "changeme"
    redisPassword:        "changeme"
    jwtSecret:            "changeme-replace-with-min-256bit-random-key"
    grafanaPassword:      "changeme"
    configServerGitToken: "changeme"

  # ── Standard resource profile (all app services) ────────────────────────
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # ── Pod security context (applied to every pod) ─────────────────────────
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # ── Container security context ───────────────────────────────────────────
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # ── Probes (Spring Boot Actuator endpoints) ──────────────────────────────
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  # ── HPA defaults ─────────────────────────────────────────────────────────
  hpa:
    minReplicas: 2
    maxReplicas: 5
    cpuUtilization: 70

  # ── PDB defaults ─────────────────────────────────────────────────────────
  pdb:
    minAvailable: 1

# =============================================================================
# Infrastructure Services (smartbank-infra)
# =============================================================================

configServer:
  enabled: true
  replicaCount: 2
  image:
    repository: "config-server"   # Prepended with global.registry at render time
    tag: ""                        # Falls back to global.imageTag if empty
  port: 8888
  gitUri: "https://github.com/your-org/smartbank-config"   # Replace
  gitBranch: "main"
  gitCloneOnStart: "true"
  encryptKey: "changeme-use-a-strong-random-256bit-key"     # Replace

discoveryServer:
  enabled: true
  replicaCount: 2
  image:
    repository: "discovery-server"
    tag: ""
  port: 8761
  selfPreservation: "true"
  renewalPercentThreshold: "0.85"

# =============================================================================
# Application Services (smartbank-apps)
# Each entry generates: Deployment, Service, HPA, PDB, ConfigMap, Secret
# =============================================================================

apps:

  api-gateway:
    enabled: true
    replicaCount: 2
    image:
      repository: "api-gateway"
      tag: ""
    port: 8080
    serviceType: LoadBalancer
    serviceAnnotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    extraEnv: {}
    secrets:
      JWT_SECRET: ""    # Inherited from global.secrets.jwtSecret if empty

  auth-service:
    enabled: true
    replicaCount: 2
    image:
      repository: "auth-service"
      tag: ""
    port: 8081
    serviceType: ClusterIP
    serviceAnnotations: {}
    db:
      name: smartbank_auth
    extraEnv:
      SPRING_REDIS_HOST: ""   # Inherits global.redisHost
      SPRING_REDIS_PORT: "6379"
    secrets:
      DB_USERNAME: "smartbank"
      DB_PASSWORD: ""         # global.secrets.postgresPassword
      REDIS_PASSWORD: ""      # global.secrets.redisPassword
      JWT_SECRET: ""

  account-service:
    enabled: true
    replicaCount: 2
    image:
      repository: "account-service"
      tag: ""
    port: 8082
    serviceType: ClusterIP
    serviceAnnotations: {}
    db:
      name: smartbank_accounts
    extraEnv: {}
    secrets:
      DB_USERNAME: "smartbank"
      DB_PASSWORD: ""

  transaction-service:
    enabled: true
    replicaCount: 2
    image:
      repository: "transaction-service"
      tag: ""
    port: 8083
    serviceType: ClusterIP
    serviceAnnotations: {}
    db:
      name: smartbank_transactions
    extraEnv:
      SPRING_REDIS_HOST: ""
      SPRING_REDIS_PORT: "6379"
      SPRING_KAFKA_PRODUCER_ACKS: "all"
      SPRING_KAFKA_PRODUCER_ENABLE_IDEMPOTENCE: "true"
      SPRING_KAFKA_CONSUMER_GROUP_ID: "transaction-service"
    secrets:
      DB_USERNAME: "smartbank"
      DB_PASSWORD: ""
      REDIS_PASSWORD: ""
      KAFKA_SASL_PASSWORD: ""

  notification-service:
    enabled: true
    replicaCount: 2
    image:
      repository: "notification-service"
      tag: ""
    port: 8084
    serviceType: ClusterIP
    serviceAnnotations: {}
    extraEnv:
      SPRING_MAIL_HOST: "smtp.example.com"
      SPRING_MAIL_PORT: "587"
      SPRING_KAFKA_CONSUMER_GROUP_ID: "notification-service"
    secrets:
      SPRING_MAIL_PASSWORD: "changeme"
      SMS_API_KEY: "changeme"
      KAFKA_SASL_PASSWORD: ""

# =============================================================================
# Ingress
# =============================================================================

ingress:
  enabled: true
  host: "api.smartbank.com"        # Replace with your domain
  tlsSecretName: "smartbank-tls"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "20"
    nginx.ingress.kubernetes.io/limit-connections: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
  authStrictAnnotations:
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"

# =============================================================================
# Zipkin (owned by this chart — not an external dependency)
# =============================================================================

zipkin:
  enabled: true
  replicaCount: 1
  image:
    repository: "openzipkin/zipkin"
    tag: "3.1"
  port: 9411
  storageType: "mem"             # Replace with "elasticsearch" for production
  maxSpans: "500000"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# =============================================================================
# External chart values — passed through to Bitnami / community charts
# Key names MUST match the `alias` field in Chart.yaml
# =============================================================================

# ── PostgreSQL (bitnami/postgresql) ──────────────────────────────────────────
postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        username: "smartbank"
        password: ""          # Resolved from global.secrets.postgresPassword
        postgresPassword: ""  # global.secrets.postgresRootPassword
  primary:
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1Gi }
    persistence:
      enabled: true
      size: 20Gi
    podSecurityContext:
      enabled: true
      runAsUser: 1001
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
    initdb:
      scripts:
        01-create-dbs.sql: |
          CREATE DATABASE IF NOT EXISTS smartbank_auth;
          CREATE DATABASE IF NOT EXISTS smartbank_accounts;
          CREATE DATABASE IF NOT EXISTS smartbank_transactions;
          GRANT ALL PRIVILEGES ON DATABASE smartbank_auth TO smartbank;
          GRANT ALL PRIVILEGES ON DATABASE smartbank_accounts TO smartbank;
          GRANT ALL PRIVILEGES ON DATABASE smartbank_transactions TO smartbank;
  readReplicas:
    replicaCount: 1
    persistence:
      size: 20Gi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# ── Redis (bitnami/redis) ─────────────────────────────────────────────────────
redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
    password: ""    # global.secrets.redisPassword
  master:
    persistence:
      size: 5Gi
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }
  replica:
    replicaCount: 1
    persistence:
      size: 5Gi
  commonConfiguration: |
    maxmemory 400mb
    maxmemory-policy allkeys-lru
    appendonly yes
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# ── Kafka (bitnami/kafka) — KRaft mode ───────────────────────────────────────
kafka:
  enabled: true
  replicaCount: 3
  kraft:
    enabled: true
  persistence:
    size: 10Gi
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 1000m, memory: 2Gi }
  extraConfig: |
    default.replication.factor=3
    min.insync.replicas=2
    offsets.topic.replication.factor=3
    transaction.state.log.replication.factor=3
    transaction.state.log.min.isr=2
    auto.create.topics.enable=false
  provisioning:
    enabled: true
    topics:
      - name: transaction-events
        partitions: 6
        replicationFactor: 3
        config:
          retention.ms: "604800000"
          min.insync.replicas: "2"
      - name: notification-events
        partitions: 3
        replicationFactor: 3
      - name: account-events
        partitions: 6
        replicationFactor: 3
  podDisruptionBudget:
    create: true
    minAvailable: 2
  metrics:
    kafka:
      enabled: true
    jmx:
      enabled: true
    serviceMonitor:
      enabled: true

# ── ZooKeeper (bitnami/zookeeper) ────────────────────────────────────────────
zookeeper:
  enabled: false    # Disabled — Kafka uses KRaft. Enable only if running Kafka in ZK mode.
  replicaCount: 3
  persistence:
    size: 5Gi
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ── kube-prometheus-stack ─────────────────────────────────────────────────────
prometheusStack:
  enabled: true
  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: "10GB"
      resources:
        requests: { cpu: 500m, memory: 1Gi }
        limits:   { cpu: 1000m, memory: 2Gi }
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      additionalScrapeConfigs:
        - job_name: "smartbank-actuator"
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: [smartbank-apps, smartbank-infra]
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: "$1:$2"
              target_label: __address__
      additionalPrometheusRulesMap:
        smartbank-alerts:
          groups:
            - name: smartbank
              rules:
                - alert: ServiceDown
                  expr: up{namespace=~"smartbank-.*"} == 0
                  for: 2m
                  labels: { severity: critical }
                  annotations:
                    summary: "{{ $labels.job }} is down"
                - alert: HighErrorRate
                  expr: |
                    rate(http_server_requests_seconds_count{namespace=~"smartbank-.*",status=~"5.."}[5m])
                    / rate(http_server_requests_seconds_count{namespace=~"smartbank-.*"}[5m]) > 0.05
                  for: 5m
                  labels: { severity: warning }
                - alert: HighMemoryUsage
                  expr: |
                    container_memory_working_set_bytes{namespace=~"smartbank-.*"}
                    / container_spec_memory_limit_bytes{namespace=~"smartbank-.*"} > 0.85
                  for: 5m
                  labels: { severity: warning }
  grafana:
    enabled: false    # Deployed as a separate dependency below
  alertmanager:
    enabled: true

# ── Grafana (grafana/grafana) ─────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: ""    # global.secrets.grafanaPassword
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://smartbank-kube-prometheus-prometheus.smartbank-obs.svc.cluster.local:9090
          isDefault: true
          access: proxy
        - name: Zipkin
          type: zipkin
          url: http://zipkin.smartbank-obs.svc.cluster.local:9411
          access: proxy
  dashboards:
    smartbank:
      jvm-micrometer:
        gnetId: 4701
        datasource: Prometheus
      spring-boot:
        gnetId: 12900
        datasource: Prometheus
      kafka-overview:
        gnetId: 7589
        datasource: Prometheus

# ── ingress-nginx ─────────────────────────────────────────────────────────────
ingressNginx:
  enabled: true
  controller:
    replicaCount: 2
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    config:
      server-tokens: "false"
      ssl-protocols: "TLSv1.2 TLSv1.3"
      hsts: "true"
      hsts-max-age: "31536000"
      use-gzip: "true"
    service:
      type: LoadBalancer
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: ingress-nginx
            topologyKey: kubernetes.io/hostname
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

# ─── Network Policies ─────────────────────────────────────────────────────────
networkPolicies:
  enabled: true
