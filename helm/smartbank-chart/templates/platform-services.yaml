# ─── Discovery Server ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "discovery-server" | nindent 4 }}
spec:
  ports:
    - name: http
      port: 8761
      targetPort: http
  selector:
    {{- include "smartbank.selectorLabels" "discovery-server" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "discovery-server" | nindent 4 }}
spec:
  replicas: {{ .Values.discoveryServer.replicas }}
  selector:
    matchLabels:
      {{- include "smartbank.selectorLabels" "discovery-server" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartbank.selectorLabels" "discovery-server" | nindent 8 }}
    spec:
      containers:
        - name: discovery-server
          image: {{ .Values.imageRegistry }}/smartbank-discovery-server:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8761
          envFrom:
            {{- include "smartbank.envFrom" . | nindent 12 }}
          env:
            - name: EUREKA_INSTANCE_HOSTNAME
              value: discovery-server
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: EUREKA_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:$(EUREKA_PASSWORD)@discovery-server:8761/eureka/
            - name: SPRING_SECURITY_USER_NAME
              value: eureka
            - name: SPRING_SECURITY_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: EUREKA_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.discoveryServer.resources | nindent 12 }}
---
# ─── Config Server ────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "config-server" | nindent 4 }}
spec:
  ports:
    - name: http
      port: 8888
      targetPort: http
  selector:
    {{- include "smartbank.selectorLabels" "config-server" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "config-server" | nindent 4 }}
spec:
  replicas: {{ .Values.configServer.replicas }}
  selector:
    matchLabels:
      {{- include "smartbank.selectorLabels" "config-server" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartbank.selectorLabels" "config-server" | nindent 8 }}
    spec:
      containers:
        - name: config-server
          image: {{ .Values.imageRegistry }}/smartbank-config-server:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8888
          envFrom:
            {{- include "smartbank.envFrom" . | nindent 12 }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "native,k8s"
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: EUREKA_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:$(EUREKA_PASSWORD)@discovery-server:8761/eureka/
            - name: SPRING_SECURITY_USER_NAME
              value: config
            - name: SPRING_SECURITY_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: CONFIG_SERVER_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.configServer.resources | nindent 12 }}
---
# ─── API Gateway ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "api-gateway" | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    {{- include "smartbank.selectorLabels" "api-gateway" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "api-gateway" | nindent 4 }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      {{- include "smartbank.selectorLabels" "api-gateway" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartbank.selectorLabels" "api-gateway" | nindent 8 }}
    spec:
      containers:
        - name: api-gateway
          image: {{ .Values.imageRegistry }}/smartbank-api-gateway:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            {{- include "smartbank.envFrom" . | nindent 12 }}
          env:
            {{- include "smartbank.springEnv" . | nindent 12 }}
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: REDIS_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
