{{- range .Values.postgres.instances }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-{{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" (printf "postgres-%s" .name) | nindent 4 }}
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    {{- include "smartbank.selectorLabels" (printf "postgres-%s" .name) | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-{{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" (printf "postgres-%s" .name) | nindent 4 }}
spec:
  serviceName: postgres-{{ .name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "smartbank.selectorLabels" (printf "postgres-%s" .name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartbank.selectorLabels" (printf "postgres-%s" .name) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ $.Values.postgres.image }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .database }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, {{ $.Values.secrets.postgresUser }}, -d, {{ .database }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: [pg_isready, -U, {{ $.Values.secrets.postgresUser }}, -d, {{ .database }}]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .storage }}
{{- end }}
