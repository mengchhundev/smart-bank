apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "redis" | nindent 4 }}
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    {{- include "smartbank.selectorLabels" "redis" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "redis" | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "smartbank.selectorLabels" "redis" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartbank.selectorLabels" "redis" | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - sh
            - -c
            - exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: REDIS_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
