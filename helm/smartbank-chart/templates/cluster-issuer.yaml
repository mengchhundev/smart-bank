{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "smartbank.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ .Values.certManager.email }}
    server: {{ .Values.certManager.acmeServer }}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
{{- end }}
