# ─── Auth Service ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "auth-service" | nindent 4 }}
spec:
  ports:
    - name: http
      port: 8081
      targetPort: http
  selector:
    {{- include "smartbank.selectorLabels" "auth-service" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "auth-service" | nindent 4 }}
spec:
  replicas: {{ .Values.businessServices.replicas }}
  selector:
    matchLabels:
      {{- include "smartbank.selectorLabels" "auth-service" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartbank.selectorLabels" "auth-service" | nindent 8 }}
    spec:
      containers:
        - name: auth-service
          image: {{ .Values.imageRegistry }}/smartbank-auth-service:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            {{- include "smartbank.envFrom" . | nindent 12 }}
          env:
            {{- include "smartbank.springEnv" . | nindent 12 }}
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-auth:5432/auth_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_ACCESS_TOKEN_EXPIRATION
              value: {{ .Values.authService.jwt.accessTokenExpiration | quote }}
            - name: JWT_REFRESH_TOKEN_EXPIRATION
              value: {{ .Values.authService.jwt.refreshTokenExpiration | quote }}
          {{- include "smartbank.businessProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.businessServices.resources | nindent 12 }}
---
