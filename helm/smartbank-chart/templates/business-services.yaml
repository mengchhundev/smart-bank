    {{- include "smartbank.selectorLabels" "notification-service" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "notification-service" | nindent 4 }}
spec:
  replicas: {{ .Values.businessServices.replicas }}
  selector:
    matchLabels:
      {{- include "smartbank.selectorLabels" "notification-service" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartbank.selectorLabels" "notification-service" | nindent 8 }}
    spec:
      containers:
        - name: notification-service
          image: {{ .Values.imageRegistry }}/smartbank-notification-service:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8085
          envFrom:
            {{- include "smartbank.envFrom" . | nindent 12 }}
          env:
            {{- include "smartbank.springEnv" . | nindent 12 }}
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-notification:5432/notification_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartbank-config
                  key: SMTP_HOST
            - name: SPRING_MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartbank-config
                  key: SMTP_PORT
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: SMTP_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secret
                  key: SMTP_PASSWORD
            - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
              valueFrom:
                configMapKeyRef:
                  name: smartbank-config
                  key: SMTP_AUTH
            - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
              valueFrom:
                configMapKeyRef:
                  name: smartbank-config
                  key: SMTP_STARTTLS_ENABLE
            - name: MANAGEMENT_HEALTH_MAIL_ENABLED
              value: "false"
          {{- include "smartbank.businessProbes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.businessServices.resources | nindent 12 }}
