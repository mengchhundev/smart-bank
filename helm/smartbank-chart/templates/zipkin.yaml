apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "zipkin" | nindent 4 }}
spec:
  ports:
    - name: http
      port: 9411
      targetPort: http
  selector:
    {{- include "smartbank.selectorLabels" "zipkin" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "smartbank.componentLabels" "zipkin" | nindent 4 }}
spec:
  replicas: {{ .Values.zipkin.replicas }}
  selector:
    matchLabels:
      {{- include "smartbank.selectorLabels" "zipkin" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "smartbank.selectorLabels" "zipkin" | nindent 8 }}
    spec:
      containers:
        - name: zipkin
          image: {{ .Values.zipkin.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 9411
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.zipkin.resources | nindent 12 }}
