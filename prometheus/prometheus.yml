global:
  scrape_interval:     15s   # pull metrics every 15 s
  evaluation_interval: 15s   # evaluate alerting rules every 15 s

# ── Scrape configs ────────────────────────────────────────────────────────────
# Services run on the host; Prometheus runs in Docker.
# "host.docker.internal" resolves to the host on Windows/Mac Docker Desktop.
# On Linux add "extra_hosts: host.docker.internal:host-gateway" in docker-compose.yml.
scrape_configs:

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'host.docker.internal:8080' ]
        labels:
          application: api-gateway

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'host.docker.internal:8081' ]
        labels:
          application: auth-service

  - job_name: account-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'host.docker.internal:8082' ]
        labels:
          application: account-service

  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'host.docker.internal:8083' ]
        labels:
          application: transaction-service

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'host.docker.internal:8085' ]
        labels:
          application: notification-service

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'host.docker.internal:8888' ]
        labels:
          application: config-server

  - job_name: discovery-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'host.docker.internal:8761' ]
        labels:
          application: discovery-server
