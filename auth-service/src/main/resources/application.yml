server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: smartbank
    password: smartbank123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# ── Swagger / OpenAPI ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  api-gateway-url: http://localhost:8080

# ── JWT Configuration ─────────────────────────────────────────
jwt:
  secret: smartbank-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256
  access-token-expiration: 900000       # 15 minutes
  refresh-token-expiration: 604800000   # 7 days

# ── Eureka ────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka123@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ── Actuator + Tracing ────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
