spring:
  application:
    name: auth-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

eureka:
  client:
    enabled: false
