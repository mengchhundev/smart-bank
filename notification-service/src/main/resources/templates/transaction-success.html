<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Transfer Successful</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; background-color: #f3f4f6;">
<div style="background-color: #1a56db; color: white; padding: 24px; text-align: center;">
    <h1 style="margin: 0; font-size: 24px;">SmartBank</h1>
</div>

<div style="background-color: #ffffff; padding: 32px; border: 1px solid #e5e7eb;">
    <div style="text-align: center; margin-bottom: 24px;">
        <span style="font-size: 48px; color: #16a34a;">&#10003;</span>
        <h2 style="color: #16a34a; margin: 8px 0 0;">Transfer Successful</h2>
    </div>

    <p style="color: #374151;">Your fund transfer has been completed successfully.</p>

    <table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
        <tr style="border-bottom: 1px solid #e5e7eb;">
            <td style="padding: 12px 8px; color: #6b7280; font-size: 14px;">Reference</td>
            <td style="padding: 12px 8px; color: #111827; font-weight: bold;"
                th:text="${referenceNumber}"></td>
        </tr>
        <tr style="border-bottom: 1px solid #e5e7eb; background-color: #f9fafb;">
            <td style="padding: 12px 8px; color: #6b7280; font-size: 14px;">Amount</td>
            <td style="padding: 12px 8px; color: #111827; font-weight: bold;">
                <span th:text="${amount}"></span>
                <span th:text="' ' + ${currency}"></span>
            </td>
        </tr>
        <tr style="border-bottom: 1px solid #e5e7eb;">
            <td style="padding: 12px 8px; color: #6b7280; font-size: 14px;">From</td>
            <td style="padding: 12px 8px; color: #111827;" th:text="${sourceAccount}"></td>
        </tr>
        <tr style="border-bottom: 1px solid #e5e7eb; background-color: #f9fafb;">
            <td style="padding: 12px 8px; color: #6b7280; font-size: 14px;">To</td>
            <td style="padding: 12px 8px; color: #111827;" th:text="${targetAccount}"></td>
        </tr>
        <tr>
            <td style="padding: 12px 8px; color: #6b7280; font-size: 14px;">Date</td>
            <td style="padding: 12px 8px; color: #111827;" th:text="${timestamp}"></td>
        </tr>
    </table>
</div>

<div style="padding: 16px; text-align: center; color: #9ca3af; font-size: 12px;">
    <p style="margin: 0;">This is an automated notification from SmartBank. Do not reply to this email.</p>
</div>
</body>
</html>
