name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-flight runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'
  DOCKER_HUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/smartbank

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 – Build, unit tests, integration tests, coverage
  # ──────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Testcontainers requires Docker-in-Docker socket
    services: {}   # Docker socket is available on ubuntu-latest by default

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarQube needs full history

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run all tests (unit + integration) with JaCoCo
        env:
          # Tell Testcontainers it's running in CI so it uses the host Docker
          TESTCONTAINERS_RYUK_DISABLED: 'true'
          SPRING_PROFILES_ACTIVE: test
        run: |
          ./gradlew test jacocoTestReport jacocoTestCoverageVerification \
            --continue \
            --no-daemon

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: '**/build/test-results/test/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload JaCoCo reports (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: '**/build/reports/jacoco/'
          retention-days: 14

      - name: Upload compiled classes (for SonarQube)
        uses: actions/upload-artifact@v4
        with:
          name: build-classes
          path: |
            **/build/classes/
            **/build/reports/jacoco/**/jacocoTestReport.xml
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # Job 2 – SonarCloud quality gate
  # ──────────────────────────────────────────────────────────────
  code-quality:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only on push (not every PR from forks to protect secrets)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}

      - name: Download build artifacts (classes + coverage reports)
        uses: actions/download-artifact@v4
        with:
          name: build-classes

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run SonarQube analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          ./gradlew sonar \
            -Dsonar.token=$SONAR_TOKEN \
            --no-daemon

      - name: Check Quality Gate
        run: echo "Quality Gate evaluated by Sonar Gradle plugin"

  # ──────────────────────────────────────────────────────────────
  # Job 3 – Build & push Docker images (matrix per service)
  # ──────────────────────────────────────────────────────────────
  build-docker-images:
    name: Docker – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: config-server
            port: 8888
          - service: discovery-server
            port: 8761
          - service: api-gateway
            port: 8080
          - service: auth-service
            port: 8081
          - service: account-service
            port: 8082
          - service: transaction-service
            port: 8083
          - service: notification-service
            port: 8085

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME//\//-}"   # replace / with - for safe tag names
          SHA="${GITHUB_SHA::8}"
          IMAGE="${{ env.DOCKER_HUB_REPO }}-${{ matrix.service }}"
          echo "image=${IMAGE}"                         >> "$GITHUB_OUTPUT"
          echo "tag=${BRANCH}-${SHA}"                   >> "$GITHUB_OUTPUT"
          echo "full=${IMAGE}:${BRANCH}-${SHA}"         >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE}:latest"                 >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_PORT=${{ matrix.port }}
          tags: |
            ${{ steps.meta.outputs.full }}
            ${{ steps.meta.outputs.latest }}
          # Enable BuildKit layer caching via Docker Hub
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Save image tag to artifact
        run: echo "${{ steps.meta.outputs.full }}" >> image-tags.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag-${{ matrix.service }}
          path: image-tags.txt
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # Job 4 – Trivy security scan on every pushed image
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: Trivy – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-docker-images

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - auth-service
          - account-service
          - transaction-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image name
        id: image
        run: |
          BRANCH="${GITHUB_REF_NAME//\//-}"
          SHA="${GITHUB_SHA::8}"
          echo "ref=${{ env.DOCKER_HUB_REPO }}-${{ matrix.service }}:${BRANCH}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub (pull)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'          # fail the job on CRITICAL findings
          ignore-unfixed: true    # ignore vulns with no patch available
          vuln-type: 'os,library'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────
  # Job 5 – Lint Helm chart
  # ──────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Add Helm dependency repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build helm/smartbank

      - name: Lint Helm chart
        run: |
          helm lint helm/smartbank \
            --set global.imageRegistry=docker.io/test \
            --set global.imageTag=latest
