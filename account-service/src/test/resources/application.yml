spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false

jwt:
  secret: smartbank-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256

eureka:
  client:
    enabled: false
